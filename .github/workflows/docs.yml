name: docs

# Builds the mkdocs site and deploys it to GitHub Pages on every push to
# main that touches docs sources (or the workflow itself). The site is
# served at https://sidis405.github.io/sidebar/ (matches mkdocs.yml
# `site_url`). Pages is configured to "GitHub Actions" as its source, so
# there is no `gh-pages` branch; the artifact uploaded here is what gets
# served.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Pages deploys must serialize. `cancel-in-progress: false` lets an
# in-flight deploy finish before the next one starts; cancelling
# half-way would leave the site in an inconsistent state.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git-revision-date-localized-plugin reads commit history to
          # render per-page "last updated" timestamps; it needs the
          # full history, not the default shallow clone.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build mkdocs site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
