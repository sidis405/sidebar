site_name: Sidebar docs
site_description: Engineering documentation for the Sidebar Package.
site_url: https://sidis405.github.io/sidebar/

repo_url: https://github.com/sidis405/sidebar
repo_name: sidis405/sidebar
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys

plugins:
  - search
  - social
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

# Explicit nav: every entry below shows up in the sidebar. Anything not
# listed here is reachable by URL but does not clutter the sidebar — that
# is how "Decisions" stays one item even though docs/decisions/ holds
# eight ADR files, and how "QA" stays one item.
nav:
  - Home: index.md
  - Spec: specs/sidebar-v1-draft.md
  - Decisions: decisions/README.md
  - QA: qa/README.md
  - Ideation:
      - Sidebar: ideation/2026-05-13-sidebar-ideation.md
      - Agent collaboration: ideation/2026-05-13-agent-collaborative-markdown-workflow-ideation.md
      - Post-V1 features: ideation/2026-05-15-post-v1-feature-ideation.md
      - Editor aesthetics and ergonomics: ideation/2026-05-15-editor-aesthetics-and-ergonomics-ideation.md
